<!DOCTYPE html>
<html>
<head>
  <title>LP OAuth Test</title>

  <!-- OAuth + Crypto -->
  <script src="https://unpkg.com/oauth-1.0a@2.2.6/oauth-1.0a.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body>

<button onclick="callLP()">Call LivePerson API</button>

<h3>Output v8:</h3>
<pre id="output">Click the button...</pre>

<script>
function callLP() {

  // 🔐 YOUR CREDENTIALS
const consumerKey = "84b5865e034c4e7188937107938bd386";
const consumerSecret = "77188fea5eb6bb83";
const accessToken = "15e13c7997e2448087577777973337f9";
const tokenSecret = "422794d81d748307";

  const url = "https://va.msghist.liveperson.net/messaging_history/api/account/33668046/conversations/search";

  // 📦 Fixed time range: March 30, 2026, 12pm–10pm EST
  const body = {
  start: {
    from: Date.now() - (24 * 60 * 60 * 1000),
    to: Date.now()
  }
};

  // 🧠 OAuth setup
  const oauth = OAuth({
    consumer: { key: consumerKey, secret: consumerSecret },
    signature_method: "HMAC-SHA1",
    hash_function(base_string, key) {
      return CryptoJS.HmacSHA1(base_string, key).toString(CryptoJS.enc.Base64);
    }
  });

  const token = {
    key: accessToken,
    secret: tokenSecret
  };

  const requestData = {
    url: url,
    method: "POST"
  };

  // 🔑 Generate auth header
  const authHeader = oauth.toHeader(oauth.authorize(requestData, token));

  console.log("Auth Header:", authHeader);

  // 🚀 API call
  fetch(url, {
    method: "POST",
    headers: {
      ...authHeader,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  })
  .then(res => {
    console.log("Status:", res.status);
    return res.json();
  })
  .then(data => {

    const conversations = data.conversationHistoryRecords || [];

    // Build clean output
    let output = `Total Conversations: ${conversations.length}\n\n`;

    conversations.forEach((c, index) => {
      const id = c.info?.conversationId || "N/A";
      output += `${index + 1}. ${id}\n`;
    });

    // Show on page
    document.getElementById("output").textContent = output;

    // Debug full response
    console.log("Full response:", data);

  })
  .catch(err => {
    console.error("ERROR:", err);
    document.getElementById("output").textContent =
      "ERROR: " + err;
  });
}
</script>

</body>
</html>
